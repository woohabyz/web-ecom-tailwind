<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Admin - TokoKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">TokoKu Admin</h1>
                    <span class="ml-4 text-gray-500">|</span>
                    <span class="ml-4 text-gray-700">Verifikasi Admin</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-500 hover:text-blue-600">
                        <i class="fas fa-arrow-left mr-2"></i> Kembali
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-800 rounded-xl p-6 mb-6 text-white">
            <h2 class="text-2xl font-bold">Verifikasi Admin 👤</h2>
            <p class="text-blue-100 mt-2">Kelola permintaan akses administrator</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total Permintaan</p>
                        <h3 class="text-2xl font-bold text-gray-800 mt-1" id="totalRequests">0</h3>
                    </div>
                    <div class="bg-blue-100 p-3 rounded-full text-blue-600">
                        <i class="fas fa-user-clock"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Menunggu Verifikasi</p>
                        <h3 class="text-2xl font-bold text-gray-800 mt-1" id="pendingCount">0</h3>
                    </div>
                    <div class="bg-yellow-100 p-3 rounded-full text-yellow-600">
                        <i class="fas fa-hourglass-half"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Admin Terverifikasi</p>
                        <h3 class="text-2xl font-bold text-gray-800 mt-1" id="verifiedCount">0</h3>
                    </div>
                    <div class="bg-green-100 p-3 rounded-full text-green-600">
                        <i class="fas fa-user-check"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pending Requests -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <div class="p-6 border-b">
                <h3 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-clock mr-2 text-yellow-500"></i>
                    Permintaan Menunggu Verifikasi
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-3">Username</th>
                            <th class="px-6 py-3">Email</th>
                            <th class="px-6 py-3">Tanggal Daftar</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTable" class="text-gray-700 text-sm">
                        <!-- Data akan diisi JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Verified Admins -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-6 border-b">
                <h3 class="text-lg font-bold text-gray-800">
                    <i class="fas fa-check-circle mr-2 text-green-500"></i>
                    Admin Terverifikasi
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-3">Username</th>
                            <th class="px-6 py-3">Email</th>
                            <th class="px-6 py-3">Status</th>
                            <th class="px-6 py-3">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="verifiedTable" class="text-gray-700 text-sm">
                        <!-- Data akan diisi JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Proteksi halaman - hanya admin yang bisa akses
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            alert('Anda harus login terlebih dahulu!');
            window.location.href = 'index.html';
        } else {
            const userRole = sessionStorage.getItem('currentUserRole');
            if (userRole !== 'admin') {
                alert('️ Akses ditolak! Hanya administrator yang bisa mengakses halaman ini.');
                window.location.href = 'member-dashboard.html';
            }
        }

        // Load data users
        let validUsers = JSON.parse(localStorage.getItem('validUsers')) || [];

        // Filter users berdasarkan role admin
        const adminUsers = validUsers.filter(u => u.role === 'admin');
        const pendingUsers = adminUsers.filter(u => !u.isVerified);
        const verifiedUsers = adminUsers.filter(u => u.isVerified);

        // Update statistik
        document.getElementById('totalRequests').textContent = adminUsers.length;
        document.getElementById('pendingCount').textContent = pendingUsers.length;
        document.getElementById('verifiedCount').textContent = verifiedUsers.length;

        // Render tabel pending
        const pendingTable = document.getElementById('pendingTable');
        if (pendingUsers.length === 0) {
            pendingTable.innerHTML = `
                <tr>
                    <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                        <i class="fas fa-check-circle text-4xl text-green-500 mb-2"></i>
                        <p>Tidak ada permintaan verifikasi yang menunggu.</p>
                    </td>
                </tr>
            `;
        } else {
            pendingUsers.forEach(user => {
                pendingTable.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-6 py-4 font-medium">${user.username}</td>
                        <td class="px-6 py-4">${user.email}</td>
                        <td class="px-6 py-4">-</td>
                        <td class="px-6 py-4">
                            <span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full text-xs">
                                Menunggu Verifikasi
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="verifyUser('${user.username}')" 
                                    class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 mr-2">
                                <i class="fas fa-check mr-1"></i> Verifikasi
                            </button>
                            <button onclick="rejectUser('${user.username}')" 
                                    class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
                                <i class="fas fa-times mr-1"></i> Tolak
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Render tabel verified
        const verifiedTable = document.getElementById('verifiedTable');
        if (verifiedUsers.length === 0) {
            verifiedTable.innerHTML = `
                <tr>
                    <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                        <i class="fas fa-user-slash text-4xl text-gray-400 mb-2"></i>
                        <p>Belum ada admin yang terverifikasi.</p>
                    </td>
                </tr>
            `;
        } else {
            verifiedUsers.forEach(user => {
                verifiedTable.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-6 py-4 font-medium">${user.username}</td>
                        <td class="px-6 py-4">${user.email}</td>
                        <td class="px-6 py-4">
                            <span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs">
                                Terverifikasi
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="revokeAccess('${user.username}')" 
                                    class="bg-orange-600 text-white px-3 py-1 rounded hover:bg-orange-700">
                                <i class="fas fa-ban mr-1"></i> Cabut Akses
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Fungsi Verifikasi
        function verifyUser(username) {
            if (confirm(`Verifikasi akses admin untuk ${username}?`)) {
                const user = validUsers.find(u => u.username === username);
                if (user) {
                    user.isVerified = true;
                    localStorage.setItem('validUsers', JSON.stringify(validUsers));
                    
                    alert(`User ${username} berhasil diverifikasi!\nSekarang bisa login sebagai admin.`);
                    location.reload();
                }
            }
        }

        // Fungsi Tolak
        function rejectUser(username) {
            const reason = prompt(`Alasan penolakan untuk ${username}:\n(Alasan ini akan ditampilkan ke user)`);
            if (reason !== null) {
                // Hapus user dari daftar
                validUsers = validUsers.filter(u => u.username !== username);
                localStorage.setItem('validUsers', JSON.stringify(validUsers));
                
                alert(`Permintaan akses admin untuk ${username} ditolak.\nAlasan: ${reason || 'Tidak ada alasan'}`);
                location.reload();
            }
        }

        // Fungsi Cabut Akses
        function revokeAccess(username) {
            if (confirm(`Cabut akses admin untuk ${username}?\nUser akan kembali menjadi anggota biasa.`)) {
                const user = validUsers.find(u => u.username === username);
                if (user) {
                    user.role = 'anggota';
                    user.isVerified = false;
                    localStorage.setItem('validUsers', JSON.stringify(validUsers));
                    
                    alert(` Akses admin ${username} telah dicabut.\nUser sekarang menjadi anggota biasa.`);
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
